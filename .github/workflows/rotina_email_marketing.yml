name: Rotina Email Marketing RD Station

on:
  schedule:
    - cron: "0 11,15,19,23 * * 1-5"
  workflow_dispatch:

jobs:
  email-marketing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar credenciais Google
        env:
          GOOGLE_TOKEN_PATH: /tmp/google_token.json
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python3 scripts/make_token.py

      - name: Verificar insumos e notificar operadores
        env:
          GOOGLE_TOKEN_PATH: /tmp/google_token.json
          RDSTATION_PRIVATE_TOKEN: ${{ secrets.RDSTATION_PRIVATE_TOKEN }}
        run: |
          cd scripts
          python3 email_flow.py

      - name: Coletar metricas de campanhas enviadas
        env:
          GOOGLE_TOKEN_PATH: /tmp/google_token.json
          RDSTATION_PRIVATE_TOKEN: ${{ secrets.RDSTATION_PRIVATE_TOKEN }}
        run: |
          cd scripts
          python3 performance.py
